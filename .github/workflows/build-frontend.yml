name: EAS Build (Expo)

on:
  push:
    branches: [main]
    paths: ['frontend/**', '.github/workflows/build-frontend.yml']
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile (preview|production)'
        required: true
        default: preview

jobs:
  build:
    name: Build Android app (EAS)
    runs-on: ubuntu-latest
    if: ${{ secrets.EXPO_TOKEN != '' }}
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci || npm install
      - run: npx --yes eas-cli@latest build --platform android --profile ${{ github.event.inputs.profile || 'preview' }} --non-interactive --no-wait
